<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC - ADMIN CENTER V2</title>
    <style>
        body { background: #020205; padding: 20px; color: white; font-family: 'Rajdhani', sans-serif; }
        .admin-form { max-width: 500px; margin: 20px auto; background: #0d0d12; padding: 25px; border: 1px solid #00f2ff; border-radius: 8px; }
        label { font-size: 10px; color: #00f2ff; font-family: 'Orbitron'; display: block; margin-top: 15px; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #050508; border: 1px solid #222; color: white; border-radius: 4px; outline: none; }
        button { width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 25px; background: #39ff14; color: #000; }
        .file-box { border: 1px dashed #444; padding: 20px; text-align: center; cursor: pointer; margin-top: 10px; }
        .delete-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; margin-top: 5px; border-left: 3px solid #ff4444; }
    </style>
</head>
<body>

    <div id="login" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#020205; z-index:999; display:flex; align-items:center; justify-content:center;">
        <div class="admin-form" style="text-align:center;">
            <h2 style="color:#00f2ff; font-family:'Orbitron';">EAC ACCESS CONTROL</h2>
            <input type="password" id="pass" placeholder="Enter Admin Key...">
            <button onclick="auth()" style="background:#00f2ff;">AUTHENTICATE</button>
        </div>
    </div>

    <div class="admin-form">
        <h2 style="color:#00f2ff; font-family:'Orbitron'; text-align:center; font-size:16px;">COSMIC MULTI-UPLOADER</h2>

        <label>TIPE KONTEN</label>
        <select id="contentType">
            <option value="cosmic_data">EDUKASI (UTAMA)</option>
            <option value="music_data">MUSIC GALLERY</option>
            <option value="news_data">BERITA TERKINI</option>
            <option value="community_data">INFO KOMUNITAS</option>
        </select>

        <label>JUDUL / NAMA</label>
        <input type="text" id="title" placeholder="Input judul...">

        <label>KATEGORI (KHUSUS EDUKASI)</label>
        <select id="category">
            <option value="Planet">Planet</option>
            <option value="Galaksi">Galaksi</option>
            <option value="Bintang">Bintang</option>
            <option value="Objek">Objek</option>
            <option value="Misteri">Misteri</option>
            <option value="Teori">Teori</option>
        </select>

        <label>METODE GAMBAR</label>
        <select id="uploadMethod" onchange="toggleMethod()">
            <option value="file">GALERI (ImgBB)</option>
            <option value="url">LINK LANGSUNG</option>
        </select>

        <div id="fileMethod">
            <div class="file-box" onclick="document.getElementById('fileInput').click()">
                <span id="fileName">Pilih Cover/Gambar</span>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="updateName()">
            </div>
        </div>
        <div id="urlMethod" style="display:none;"><input type="text" id="imageUrlLink" placeholder="https://..."></div>

        <label>DESKRIPSI / PENJELASAN</label>
        <textarea id="desc" rows="4"></textarea>

        <label>LINK (ARTIKEL / DOWNLOAD MUSIC)</label>
        <input type="text" id="fullLink" placeholder="URL Target...">

        <button onclick="processUpload()" id="btnUp">PUBLISH TO CLOUD</button>
    </div>

    <div class="admin-form" style="border-color: #ff4444;">
        <h2 style="color:#ff4444; font-family:'Orbitron'; text-align:center; font-size:14px;">SYSTEM TERMINATION (DELETE)</h2>
        <select id="deleteSource">
            <option value="cosmic_data">EDUKASI</option>
            <option value="music_data">MUSIC</option>
            <option value="news_data">BERITA</option>
            <option value="community_data">KOMUNITAS</option>
        </select>
        <button onclick="loadDeleteList()" style="background:#ffcc00; margin-top:10px;">VIEW DATA</button>
        <div id="deleteList" style="margin-top:15px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3XFfAwJbh0WHd7U_2tEazVgEg2bzbKTQ",
            authDomain: "databaseeac.firebaseapp.com",
            databaseURL: "https://databaseeac-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "databaseeac",
            storageBucket: "databaseeac.firebasestorage.app",
            messagingSenderId: "275001784016",
            appId: "1:275001784016:web:5d193acbb56c1ac280d0d5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.auth = () => {
            if(document.getElementById('pass').value === "PANEL ADMIN EAC 2026") document.getElementById('login').style.display='none';
            else alert("Key Salah!");
        };

        window.toggleMethod = () => {
            const m = document.getElementById('uploadMethod').value;
            document.getElementById('fileMethod').style.display = m === 'file' ? 'block' : 'none';
            document.getElementById('urlMethod').style.display = m === 'url' ? 'block' : 'none';
        };

        window.updateName = () => {
            const f = document.getElementById('fileInput').files[0];
            if(f) document.getElementById('fileName').innerText = f.name;
        };

        window.processUpload = async () => {
            const method = document.getElementById('uploadMethod').value;
            const btn = document.getElementById('btnUp');
            btn.disabled = true; btn.innerText = "UPLOADING...";

            if(method === 'file') {
                const file = document.getElementById('fileInput').files[0];
                const formData = new FormData();
                formData.append("image", file);
                try {
                    const res = await fetch("https://api.imgbb.com/1/upload?key=1771bef0a804415dcb82b2b9d9dc5034", { method: "POST", body: formData });
                    const json = await res.json();
                    saveToFirebase(json.data.url);
                } catch(e) { alert("Upload Gagal!"); btn.disabled = false; }
            } else {
                saveToFirebase(document.getElementById('imageUrlLink').value);
            }
        };

        function saveToFirebase(url) {
            const type = document.getElementById('contentType').value;
            const dataRef = ref(db, type);
            const data = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                img: url,
                desc: document.getElementById('desc').value,
                link: document.getElementById('fullLink').value || "#",
                time: Date.now()
            };
            push(dataRef, data).then(() => {
                alert("SUCCESS!");
                location.reload();
            });
        }

        window.loadDeleteList = () => {
            const source = document.getElementById('deleteSource').value;
            const listDiv = document.getElementById('deleteList');
            onValue(ref(db, source), (snapshot) => {
                listDiv.innerHTML = "";
                const data = snapshot.val();
                for(let id in data) {
                    const div = document.createElement('div');
                    div.className = 'delete-item';
                    div.innerHTML = `<span style="font-size:11px;">${data[id].title}</span> 
                                     <button onclick="confirmDel('${source}','${id}')" style="width:auto; padding:5px 10px; margin:0; background:#ff4444; font-size:9px;">HAPUS</button>`;
                    listDiv.appendChild(div);
                }
            }, { onlyOnce: true });
        };

        window.confirmDel = (src, id) => {
            if(confirm("Hapus data ini?")) remove(ref(db, `${src}/${id}`)).then(() => alert("Deleted!"));
        };
    </script>
</body>
</html>
