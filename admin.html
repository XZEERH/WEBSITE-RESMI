<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC - COSMIC ADMIN V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --green: #39ff14; --red: #ff4444; --bg: #020205; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; padding-bottom: 50px; }
        
        /* LOGIN OVERLAY */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        .admin-card { max-width: 500px; margin: 0 auto; background: #0d0d12; border: 1px solid var(--cyan); border-radius: 12px; padding: 25px; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        h2 { font-family: 'Orbitron'; font-size: 16px; text-align: center; color: var(--cyan); margin-bottom: 25px; letter-spacing: 2px; }
        
        label { display: block; font-family: 'Orbitron'; font-size: 9px; color: #555; margin-top: 15px; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; background: #050508; border: 1px solid #222; color: white; border-radius: 6px; font-family: 'Rajdhani'; box-sizing: border-box; }
        input:focus { border-color: var(--cyan); }

        .btn-primary { width: 100%; padding: 15px; background: var(--green); color: black; border: none; border-radius: 6px; font-family: 'Orbitron'; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        .btn-primary:disabled { background: #1a3311; color: #555; }

        /* DATA LIST SECTION */
        .management-section { margin-top: 40px; border-top: 1px solid #1a1a1a; padding-top: 20px; }
        .list-item { background: #08080c; border: 1px solid #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; animation: fadeIn 0.4s ease; }
        .info-box h4 { margin: 0; font-size: 14px; color: var(--cyan); }
        .info-box span { font-size: 10px; color: #444; font-family: 'Orbitron'; }
        
        .btn-delete { background: var(--red); color: white; border: none; padding: 8px 12px; border-radius: 4px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="admin-card">
            <h2>EAC ACCESS KEY</h2>
            <input type="password" id="adminPass" placeholder="Masukkan Password Owner...">
            <button class="btn-primary" onclick="checkAuth()">AUTHENTICATE</button>
        </div>
    </div>

    <div class="admin-card">
        <h2>COSMIC CONTROL PANEL</h2>

        <label>TARGET DATABASE</label>
        <select id="targetPath" onchange="syncUI()">
            <option value="cosmic_data">DATABASE EDUKASI</option>
            <option value="cosmic_music">DATABASE MUSIC (BEAT)</option>
            <option value="cosmic_info">DATABASE INFORMASI</option>
            <option value="cosmic_comments">TRANSMISI KOMENTAR</option>
        </select>

        <div id="formUploader">
            <label id="labelTitle">JUDUL KONTEN</label>
            <input type="text" id="inpTitle" placeholder="Nama objek/lagu/info...">

            <div id="eduOnly">
                <label>KATEGORI KOSMIK</label>
                <select id="inpCat">
                    <option value="Planet">Planet</option>
                    <option value="Galaksi">Galaksi</option>
                    <option value="Bintang">Bintang</option>
                    <option value="Objek">Objek</option>
                    <option value="Misteri">Misteri</option>
                    <option value="Teori">Teori</option>
                </select>
            </div>

            <label>URL GAMBAR / COVER</label>
            <input type="text" id="inpImg" placeholder="https://link-gambar.com/file.jpg">

            <label>DESKRIPSI LENGKAP</label>
            <textarea id="inpDesc" rows="4" placeholder="Tulis penjelasan di sini..."></textarea>

            <label id="labelLink">LINK TARGET (WIKI / MP3)</label>
            <input type="text" id="inpLink" placeholder="https://...">

            <button class="btn-primary" id="btnUpload" onclick="handleUpload()">PUBLISH TO SYSTEM</button>
        </div>

        <div class="management-section">
            <h3 style="font-family:'Orbitron'; font-size:11px; color:var(--green); margin-bottom:15px;">MANAGE EXISTING DATA</h3>
            <div id="dataListContainer">
                <p style="text-align:center; font-size:10px; color:#333;">Loading data...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi DB EAC lu
        const firebaseConfig = {
            apiKey: "AIzaSyB3XFfAwJbh0WHd7U_2tEazVgEg2bzbKTQ",
            authDomain: "databaseeac.firebaseapp.com",
            databaseURL: "https://databaseeac-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "databaseeac",
            storageBucket: "databaseeac.firebasestorage.app",
            messagingSenderId: "275001784016",
            appId: "1:275001784016:web:5d193acbb56c1ac280d0d5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AUTH ---
        window.checkAuth = () => {
            const pass = document.getElementById('adminPass').value;
            if(pass === "ADMIN EAC") { // Sesuai data lu
                document.getElementById('loginOverlay').style.display = 'none';
                syncUI();
            } else {
                alert("ACCESS DENIED: WRONG KEY");
            }
        };

        // --- UI SYNC ---
        window.syncUI = () => {
            const path = document.getElementById('targetPath').value;
            const eduBox = document.getElementById('eduOnly');
            const upBox = document.getElementById('formUploader');
            
            // Atur tampilan form berdasarkan kategori
            eduBox.style.display = (path === 'cosmic_data') ? 'block' : 'none';
            upBox.style.display = (path === 'cosmic_comments') ? 'none' : 'block';

            loadDataList(path);
        };

        // --- LOAD & DELETE LOGIC ---
        function loadDataList(path) {
            const container = document.getElementById('dataListContainer');
            onValue(ref(db, path), (snapshot) => {
                container.innerHTML = '';
                const data = snapshot.val();
                
                if(!data) {
                    container.innerHTML = `<p style="text-align:center; font-size:10px; color:#333;">DATABASE KOSONG</p>`;
                    return;
                }

                Object.entries(data).reverse().forEach(([key, val]) => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `
                        <div class="info-box">
                            <h4>${val.title || val.name || "Untitled"}</h4>
                            <span>TYPE: ${path.replace('cosmic_', '').toUpperCase()}</span>
                        </div>
                        <button class="btn-delete" onclick="deleteEntry('${path}', '${key}')">HAPUS</button>
                    `;
                    container.appendChild(div);
                });
            });
        }

        window.deleteEntry = (path, key) => {
            if(confirm("Hapus data ini secara permanen dari database?")) {
                remove(ref(db, `${path}/${key}`))
                .then(() => alert("BERHASIL DIHAPUS"))
                .catch(e => alert("ERROR: " + e));
            }
        };

        // --- UPLOAD LOGIC ---
        window.handleUpload = () => {
            const path = document.getElementById('targetPath').value;
            const btn = document.getElementById('btnUpload');
            
            const payload = {
                title: document.getElementById('inpTitle').value,
                img: document.getElementById('inpImg').value,
                desc: document.getElementById('inpDesc').value,
                link: document.getElementById('inpLink').value || "#",
                time: Date.now()
            };

            if(path === 'cosmic_data') {
                payload.category = document.getElementById('inpCat').value;
            }

            if(!payload.title || !payload.img) return alert("JUDUL & GAMBAR WAJIB ISI!");

            btn.disabled = true;
            btn.innerText = "UPLOADING...";

            push(ref(db, path), payload)
            .then(() => {
                alert("DATABASE UPDATED!");
                btn.disabled = false;
                btn.innerText = "PUBLISH TO SYSTEM";
                // Reset form
                document.getElementById('inpTitle').value = '';
                document.getElementById('inpImg').value = '';
                document.getElementById('inpDesc').value = '';
                document.getElementById('inpLink').value = '';
            })
            .catch(e => {
                alert("FAILED: " + e);
                btn.disabled = false;
            });
        };
    </script>
</body>
</html>
