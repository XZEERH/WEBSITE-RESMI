<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC - OWNER CONTROL CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --green: #39ff14; --red: #ff4444; --bg: #020205; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 15px; }

        /* AUTH OVERLAY */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        
        .admin-card { max-width: 500px; margin: 0 auto; background: #0d0d12; border: 1px solid var(--cyan); border-radius: 15px; padding: 20px; box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        h2 { font-family: 'Orbitron'; font-size: 14px; text-align: center; color: var(--cyan); letter-spacing: 2px; margin-bottom: 20px; }

        label { display: block; font-family: 'Orbitron'; font-size: 9px; color: #555; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #050508; border: 1px solid #222; color: white; border-radius: 8px; font-family: 'Rajdhani'; box-sizing: border-box; }
        
        .btn-post { width: 100%; padding: 15px; background: var(--green); color: black; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .btn-post:disabled { opacity: 0.3; }

        /* LIST MANAGEMENT */
        .data-box { margin-top: 30px; border-top: 1px solid #1a1a1a; padding-top: 20px; }
        .item-row { background: #08080c; border: 1px solid #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .item-info h4 { margin: 0; font-size: 13px; color: var(--cyan); text-transform: uppercase; }
        .item-info p { margin: 3px 0 0; font-size: 10px; color: #444; }

        .btn-del { background: var(--red); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="admin-card">
            <h2>EAC OWNER AUTH</h2>
            <input type="password" id="adminPass" placeholder="Masukkan Key Owner...">
            <button class="btn-post" onclick="checkAuth()">MASUK KE SISTEM</button>
        </div>
    </div>

    <div class="admin-card">
        <h2>CENTRAL CONTROL PANEL</h2>

        <label>TARGET MANAJEMEN</label>
        <select id="targetDb" onchange="uiSwitch()">
            <option value="cosmic_data">DATABASE EDUKASI</option>
            <option value="cosmic_music">DATABASE MUSIC (BEAT)</option>
            <option value="cosmic_info">DATABASE INFORMASI</option>
            <option value="cosmic_comments">MODERASI CHAT (TOXIC)</option>
        </select>

        <div id="uploadForm">
            <label>JUDUL / NAMA</label>
            <input type="text" id="upTitle" placeholder="...">

            <div id="eduField">
                <label>KATEGORI</label>
                <select id="upCat">
                    <option value="Planet">Planet</option>
                    <option value="Galaksi">Galaksi</option>
                    <option value="Bintang">Bintang</option>
                    <option value="Objek">Objek</option>
                    <option value="Misteri">Misteri</option>
                    <option value="Teori">Teori</option>
                </select>
            </div>

            <label>URL GAMBAR (BANNER/COVER)</label>
            <input type="text" id="upImg" placeholder="https://...">

            <label>DESKRIPSI / ISI PENGUMUMAN</label>
            <textarea id="upDesc" rows="3" placeholder="Tulis di sini..."></textarea>

            <label id="linkLabel">LINK TARGET (WIKI / DOWNLOAD / INFO)</label>
            <input type="text" id="upLink" placeholder="https://...">

            <button class="btn-post" id="btnGo" onclick="handlePost()">TERBITKAN KE WEBSITE</button>
        </div>

        <div class="data-box">
            <h3 style="font-family:'Orbitron'; font-size:10px; color:var(--green);">MANAGE LIVE DATA</h3>
            <div id="liveDataList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3XFfAwJbh0WHd7U_2tEazVgEg2bzbKTQ",
            authDomain: "databaseeac.firebaseapp.com",
            databaseURL: "https://databaseeac-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "databaseeac",
            storageBucket: "databaseeac.firebasestorage.app",
            messagingSenderId: "275001784016",
            appId: "1:275001784016:web:5d193acbb56c1ac280d0d5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LOGIN (Gue set passwordnya 'OWNER EAC', bisa lu ganti kodenya)
        window.checkAuth = () => {
            const p = document.getElementById('adminPass').value;
            if(p === "OWNER EAC") {
                document.getElementById('loginOverlay').style.display = 'none';
                uiSwitch();
            } else { alert("AKSES DITOLAK!"); }
        };

        // UI SWITCHER
        window.uiSwitch = () => {
            const path = document.getElementById('targetDb').value;
            document.getElementById('eduField').style.display = (path === 'cosmic_data') ? 'block' : 'none';
            document.getElementById('uploadForm').style.display = (path === 'cosmic_comments') ? 'none' : 'block';
            
            // Label dinamis biar lu nggak bingung
            const label = document.getElementById('linkLabel');
            if(path === 'cosmic_music') label.innerText = "LINK DOWNLOAD (MP3/DRIVE)";
            else if(path === 'cosmic_info') label.innerText = "LINK SUMBER / INFO LANJUT";
            else label.innerText = "LINK WIKIPEDIA / SUMBER";

            fetchData(path);
        };

        // FETCH DATA UNTUK DIHAPUS
        function fetchData(path) {
            const container = document.getElementById('liveDataList');
            onValue(ref(db, path), (snap) => {
                container.innerHTML = '';
                const data = snap.val();
                if(!data) { container.innerHTML = '<p style="font-size:10px; color:#333; text-align:center;">TIDAK ADA DATA</p>'; return; }

                Object.entries(data).reverse().forEach(([key, val]) => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.innerHTML = `
                        <div class="item-info">
                            <h4>${val.title || val.name || "CHAT MEMBER"}</h4>
                            <p>${val.text ? val.text.substring(0,30) : (val.category || "UMUM")}</p>
                        </div>
                        <button class="btn-del" onclick="killData('${path}', '${key}')">HAPUS</button>
                    `;
                    container.appendChild(row);
                });
            });
        }

        // FUNGSI HAPUS (ANTI-TOXIC & TYPO)
        window.killData = (path, key) => {
            if(confirm("Hapus permanen data ini? Tindakan ini tidak bisa dibatalkan.")) {
                remove(ref(db, `${path}/${key}`)).then(() => alert("DATA BERHASIL DIMUSNAHKAN"));
            }
        };

        // FUNGSI UPLOAD (UPLOAD BARU)
        window.handlePost = () => {
            const path = document.getElementById('targetDb').value;
            const btn = document.getElementById('btnGo');

            const data = {
                title: document.getElementById('upTitle').value,
                img: document.getElementById('upImg').value,
                desc: document.getElementById('upDesc').value,
                link: document.getElementById('upLink').value || "#",
                time: Date.now()
            };

            if(path === 'cosmic_data') data.category = document.getElementById('upCat').value;

            if(!data.title || !data.img) return alert("JUDUL & GAMBAR WAJIB DIISI!");

            btn.disabled = true;
            btn.innerText = "SYNCHRONIZING...";

            push(ref(db, path), data).then(() => {
                alert("DATABASE BERHASIL DIUPDATE!");
                btn.disabled = false;
                btn.innerText = "TERBITKAN KE WEBSITE";
                // Reset Input
                document.getElementById('upTitle').value = '';
                document.getElementById('upImg').value = '';
                document.getElementById('upDesc').value = '';
                document.getElementById('upLink').value = '';
            });
        };
    </script>
</body>
</html>
