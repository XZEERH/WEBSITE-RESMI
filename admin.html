<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC - ADMIN PANEL</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #020205; padding: 20px; overflow-y: auto; color: white; }
        .admin-form { max-width: 500px; margin: 0 auto; background: #0d0d12; padding: 25px; border: 1px solid #00f2ff; border-radius: 8px; }
        label { font-size: 11px; color: #555; font-family: 'Orbitron'; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #050508; border: 1px solid #222; color: white; border-radius: 4px; font-family: 'Rajdhani'; }
        .file-box { border: 1px dashed #444; padding: 20px; text-align: center; cursor: pointer; margin-top: 10px; }
        button { width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 25px; transition: 0.3s; }
        #status { font-size: 11px; text-align: center; margin-top: 15px; color: #00f2ff; font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div id="login" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#020205; z-index:999; display:flex; align-items:center; justify-content:center;">
        <div class="admin-form" style="text-align:center;">
            <h2 style="color:#00f2ff; font-family:'Orbitron';">COMMAND CENTER</h2>
            <input type="password" id="pass" placeholder="Password Admin...">
            <button onclick="auth()" style="background:#00f2ff; color:black;">UNLOCK ACCESS</button>
        </div>
    </div>

    <div class="admin-form fade-in">
        <h2 style="color:#00f2ff; font-family:'Orbitron'; text-align:center;">UPLOAD DATA</h2>
        <label>JUDUL OBJEK</label>
        <input type="text" id="title" placeholder="Nama Objek...">
        <label>KATEGORI</label>
        <select id="category">
            <option value="Planet">Planet</option><option value="Galaksi">Galaksi</option>
            <option value="Bintang">Bintang</option><option value="Objek">Objek</option>
            <option value="Misteri">Misteri</option><option value="Teori">Teori</option>
        </select>
        <label>GAMBAR (AUTO-UPLOAD)</label>
        <div class="file-box" onclick="document.getElementById('fileInput').click()">
            <span id="fileName">Pilih gambar dari galeri</span>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="updateName()">
        </div>
        <label>DESKRIPSI</label>
        <textarea id="desc" rows="4"></textarea>
        <label>LINK ARTIKEL</label>
        <input type="text" id="fullLink" placeholder="Link NASA/Wiki">
        <button onclick="upload()" id="btnUp" style="background:#39ff14; color:black;">PUBLISH DATA</button>
        <div id="status"></div>
    </div>

    <script>
        const API_KEY = "1771bef0a804415dcb82b2b9d9dc5034";
        function auth() { if(document.getElementById('pass').value === "EAC2026") document.getElementById('login').style.display='none'; else alert("Sandi salah!"); }
        function updateName() { const f = document.getElementById('fileInput').files[0]; if(f) document.getElementById('fileName').innerText = f.name; }
        async function upload() {
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('btnUp');
            if(!file) return alert("Pilih gambar dulu!");
            btn.disabled = true; btn.innerText = "UPLOADING...";
            const formData = new FormData();
            formData.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: "POST", body: formData });
                const json = await res.json();
                if(json.success) save(json.data.url);
            } catch(e) { alert("Gagal!"); btn.disabled = false; }
        }
        function save(imgUrl) {
            let db = JSON.parse(localStorage.getItem('cosmic_db')) || [];
            db.push({ title: document.getElementById('title').value, category: document.getElementById('category').value, img: imgUrl, desc: document.getElementById('desc').value, link: document.getElementById('fullLink').value });
            localStorage.setItem('cosmic_db', JSON.stringify(db));
            window.location.href="index.html";
        }
    </script>
</body>
</html>
