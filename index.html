<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EAC COSMIC DATABASE - V2.1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="welcomeOverlay">
        <div class="pulse-dot-big"></div>
        <h2 id="welcomeText">INITIALIZING SYSTEM...</h2>
        <div class="load-bar"><div id="progressBar"></div></div>
    </div>

    <div class="stars"></div>
    <div class="twinkling"></div>

    <header id="mainHeader" class="fade-in">
        <h2 class="top-title">EAC PUSAT INFORMASI</h2>
        <h1 class="main-logo">COSMIC <span>DATABASE</span></h1>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari Informasi Kosmik..." onkeyup="searchData()">
        </div>

        <div class="filter-grid">
            <button class="filter-btn active" onclick="filterData('all')">SEMUA</button>
            <button class="filter-btn" onclick="filterData('Planet')">PLANET</button>
            <button class="filter-btn" onclick="filterData('Galaksi')">GALAKSI</button>
            <button class="filter-btn" onclick="filterData('Bintang')">BINTANG</button>
            <button class="filter-btn" onclick="filterData('Objek')">OBJEK</button>
            <button class="filter-btn" onclick="filterData('Misteri')">MISTERI</button>
            <button class="filter-btn" onclick="filterData('Teori')">TEORI</button>
        </div>
    </header>

    <main id="eduSection" class="tab-content">
        <div id="cardContainer" class="main-grid fade-in"></div>
    </main>

    <section id="musicSection" class="tab-content" style="display:none;">
        <h2 class="section-title">COSMIC BEAT</h2>
        <div id="musicContainer" class="main-grid"></div>
    </section>

    <section id="infoSection" class="tab-content" style="display:none;">
        <h2 class="section-title" style="color:var(--green)">COMMUNITY INFO</h2>
        <div id="infoContainer" class="main-grid"></div>
    </section>

    <section id="comSection" class="tab-content" style="display:none;">
        <h2 class="section-title" style="color:#ff00ff">PUBLIC TRANSMISSION</h2>
        <div id="chatAuth" class="chat-form">
            <p class="chat-label">IDENTITAS TRANSMISI</p>
            <input type="text" id="chatUser" placeholder="Nama Anda...">
            <input type="password" id="chatPass" placeholder="Password (Bebas)...">
            <button onclick="loginChat()">HUBUNGKAN SINYAL</button>
        </div>
        <div id="chatBox" class="chat-form" style="display:none;">
            <p id="activeUser" class="user-active-tag"></p>
            <textarea id="comText" placeholder="Tulis pesan ke publik..."></textarea>
            <button onclick="sendComment()">KIRIM PESAN</button>
            <span class="logout-btn" onclick="logoutChat()">Ganti Identitas</span>
        </div>
        <div id="commentContainer" style="padding:0 20px;"></div>
    </section>

    <div id="modal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-img-wrapper">
                <img id="modalImg" src="">
            </div>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <div class="tag-label" id="modalTag">OBJECT</div>
                <p id="modalDesc"></p>
                <div class="integrity-badge">
                    <span>DATA INTEGRITY: <span style="color:var(--green)">100% VERIFIED INTEGRATED</span></span>
                </div>
                <a id="modalLink" href="#" target="_blank" class="access-btn">BACA RISET LENGKAP →</a>
            </div>
        </div>
    </div>

    <footer><div class="system-footer">SISTEM TERKENDALI AMAN</div></footer>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('edu', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            <span>EDU</span>
        </div>
        <div class="nav-item" onclick="switchTab('music', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            <span>BEAT</span>
        </div>
        <div class="nav-item" onclick="switchTab('info', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span>INFO</span>
        </div>
        <div class="nav-item" onclick="switchTab('com', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            <span>CHAT</span>
        </div>
    </nav>

    <script type="module" src="script.js"></script>
</body>
</html>
