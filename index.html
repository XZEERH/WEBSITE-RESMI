<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EAC - COSMIC DATABASE V5</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>

    <header id="mainHeader">
        <h2 class="top-title">EAC PUSAT INFORMASI</h2>
        <h1 class="main-logo">COSMIC <span>DATABASE</span></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari Informasi Kosmik..." onkeyup="searchData()">
        </div>
        <div class="filter-grid">
            <button class="filter-btn active" onclick="filterData('all')">SEMUA</button>
            <button class="filter-btn" onclick="filterData('Planet')">PLANET</button>
            <button class="filter-btn" onclick="filterData('Galaksi')">GALAKSI</button>
            <button class="filter-btn" onclick="filterData('Bintang')">BINTANG</button>
            <button class="filter-btn" onclick="filterData('Objek')">OBJEK</button>
            <button class="filter-btn" onclick="filterData('Misteri')">MISTERI</button>
            <button class="filter-btn" onclick="filterData('Teori')">TEORI</button>
        </div>
    </header>

    <main id="eduSection" class="tab-content">
        <div id="cardContainer" class="main-grid"></div>
    </main>

    <section id="musicSection" class="tab-content" style="display:none;">
        <h2 class="section-title">ASTROBEAT <span>GALLERY</span></h2>
        <div id="musicContainer" class="main-grid"></div>
    </section>

    <section id="infoSection" class="tab-content" style="display:none;">
        <h2 class="section-title">COMMUNITY <span>INFO</span></h2>
        <div id="infoContainer" class="main-grid"></div>
    </section>

    <section id="comSection" class="tab-content" style="display:none;">
        <div class="iea-header"><span>IEA NETWORK (PUBLIC)</span></div>
        
        <div id="chatAuth" class="login-center">
            <div class="login-card">
                <h3>SILAHKAN LOGIN</h3>
                <input type="text" id="chatUser" placeholder="Nama:">
                <input type="password" id="chatPass" placeholder="Password: (Bebas)">
                <button onclick="loginChat()">LANJUTKAN</button>
            </div>
        </div>

        <div id="commentContainer" class="iea-feed" style="display:none;"></div>

        <div id="replyIndicator">
            Debat: <span id="replyTargetName"></span> 
            <span onclick="cancelReply()" style="color:#ff4444; float:right; cursor:pointer;">BATAL</span>
        </div>

        <div class="iea-input-bar" id="chatInputBar" style="display:none;">
            <input type="text" id="comText" placeholder="Tulis Hipotesis...">
            <button onclick="sendComment()">➤</button>
        </div>
    </section>

    <div class="system-footer">SISTEM TERKENDALI AMAN</div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('edu', this)">
            <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM3.89 9L12 4.57 20.11 9 12 13.43 3.89 9zM12 17l-6.31-3.44-1.9 1.04L12 21l8.21-4.48-1.9-1.04L12 17z"/></svg>
            <span>EDU</span>
        </div>
        <div class="nav-item" onclick="switchTab('music', this)">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <span>BEAT</span>
        </div>
        <div class="nav-item" onclick="switchTab('info', this)">
            <svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
            <span>INFO</span>
        </div>
        <div class="nav-item" onclick="switchTab('com', this)">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
            <span>CHAT</span>
        </div>
    </nav>

    <script type="module" src="script.js"></script>
</body>
</html>
