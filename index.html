<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EAC - COSMIC DATABASE V4</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>

    <header id="mainHeader">
        <h2 class="top-title">EAC PUSAT INFORMASI</h2>
        <h1 class="main-logo">COSMIC <span>DATABASE</span></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari Informasi Kosmik..." onkeyup="searchData()">
        </div>
        <div class="status-bar">
            <span>SISTEM AKTIF</span>
            <span class="signal">SIGNAL <b id="ping">169ms</b></span>
        </div>
        <div class="filter-grid">
            <button class="filter-btn active" onclick="filterData('all')">SEMUA</button>
            <button class="filter-btn" onclick="filterData('Planet')">PLANET</button>
            <button class="filter-btn" onclick="filterData('Galaksi')">GALAKSI</button>
            <button class="filter-btn" onclick="filterData('Bintang')">BINTANG</button>
            <button class="filter-btn" onclick="filterData('Objek')">OBJEK</button>
            <button class="filter-btn" onclick="filterData('Misteri')">MISTERI</button>
            <button class="filter-btn" onclick="filterData('Teori')">TEORI</button>
        </div>
    </header>

    <main id="eduSection" class="tab-content">
        <div id="cardContainer" class="main-grid"></div>
    </main>

    <section id="musicSection" class="tab-content" style="display:none;">
        <h2 class="section-title">ASTROBEAT <span>GALLERY</span></h2>
        <div id="musicContainer" class="main-grid"></div>
    </section>

    <section id="infoSection" class="tab-content" style="display:none;">
        <h2 class="section-title">COMMUNITY <span>INFO</span></h2>
        <div id="infoContainer" class="main-grid"></div>
    </section>

    <section id="comSection" class="tab-content" style="display:none;">
        <div class="iea-header">
            <span>IEA NETWORK</span>
            <div class="iea-icons" onclick="showProfile()">
                <svg width="24" viewBox="0 0 24 24" fill="var(--cyan)"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
        </div>
        
        <div id="chatAuth" class="auth-box">
            <input type="text" id="chatUser" placeholder="Nama Akun...">
            <button onclick="loginChat()">LOGIN KE IEA</button>
        </div>

        <div id="commentContainer" class="iea-feed"></div>

        <div id="replyIndicator">
            Debat: <span id="replyTargetName"></span> 
            <span onclick="cancelReply()" style="color:#ff4444; float:right; cursor:pointer;">BATAL</span>
        </div>

        <div class="iea-input-bar" id="chatInputBar" style="display:none;">
            <button class="add-btn">+</button>
            <input type="text" id="comText" placeholder="Tulis Hipotesis...">
            <button class="send-btn" onclick="sendComment()">➤</button>
        </div>
    </section>

    <div id="profileModal" class="modal">
        <div class="modal-content profile-card">
            <span class="close-btn" onclick="closeProfile()">&times;</span>
            <div class="profile-header">
                <div class="avatar-large">👤</div>
                <h2 id="profName">Razeerh</h2>
                <span class="rank">NOVICE RESEARCHER</span>
                <p class="bio">Bio Kosong</p>
                <div class="tag-box">General Science</div>
            </div>
            <div class="stats-grid">
                <div><b>0</b><br>XP</div>
                <div><b>1</b><br>LVL</div>
                <div><b>0</b><br>KUTIPAN</div>
            </div>
            <button class="edit-btn">EDIT PROFIL</button>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <div class="system-footer">SISTEM TERKENDALI AMAN</div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('edu', this)"><span>EDU</span></div>
        <div class="nav-item" onclick="switchTab('music', this)"><span>BEAT</span></div>
        <div class="nav-item" onclick="switchTab('info', this)"><span>INFO</span></div>
        <div class="nav-item" onclick="switchTab('com', this)"><span>CHAT</span></div>
    </nav>

    <script type="module" src="script.js"></script>
</body>
</html>
